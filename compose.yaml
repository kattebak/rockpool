services:
  caddy:
    image: docker.io/library/caddy:2
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    environment:
      CADDY_ADMIN_PORT: ${CADDY_ADMIN_PORT:-2019}
    ports:
      - "${CADDY_ADMIN_PORT:-2019}:${CADDY_ADMIN_PORT:-2019}"
      - "${SRV0_PORT:-8080}:${SRV0_PORT:-8080}"
      - "${SRV1_PORT:-8081}:${SRV1_PORT:-8081}"
      - "${SRV2_PORT:-8082}:${SRV2_PORT:-8082}"
    restart: unless-stopped
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  elasticmq:
    image: docker.io/softwaremill/elasticmq-native
    restart: unless-stopped
    ports:
      - "9324:9324"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro

  control-plane:
    build: images/control-plane
    init: true
    working_dir: /app
    environment:
      ROCKPOOL_CONFIG: /app/${ROCKPOOL_CONFIG:-rockpool.config.json}
      CONTAINER_HOST: unix:///run/podman.sock
      CONTROL_PLANE_HOST: control-plane
      PORT: ${PORT:-7163}
      CADDY_ADMIN_URL: http://caddy:${CADDY_ADMIN_PORT:-2019}
      SRV0_PORT: ${SRV0_PORT:-8080}
      SRV1_PORT: ${SRV1_PORT:-8081}
      SRV2_PORT: ${SRV2_PORT:-8082}
      DB_PATH: ${DB_PATH:-rockpool.db}
      QUEUE_ENDPOINT: http://elasticmq:9324
      QUEUE_URL: http://elasticmq:9324/000000000000/workspace-jobs
      CONTAINER_HOST_ADDRESS: host.containers.internal
      SPA_PROXY_URL: ${SPA_PROXY_URL:-}
      NODE_WATCH: ${NODE_WATCH:-}
    security_opt:
      - label=disable
    restart: unless-stopped
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - rockpool-data:/opt/rockpool
      - ${PODMAN_SOCKET:-/var/run/docker.sock}:/run/podman.sock
    depends_on:
      - caddy
      - elasticmq

volumes:
  caddy-data:
  caddy-config:
  rockpool-data:
  node-modules:
    name: rockpool-node-modules
