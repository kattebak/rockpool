services:
  caddy:
    image: docker.io/library/caddy:2
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    restart: unless-stopped
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  elasticmq:
    image: docker.io/softwaremill/elasticmq-native
    restart: unless-stopped
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf:ro

  control-plane:
    build: images/control-plane
    init: true
    working_dir: /app
    environment:
      ROCKPOOL_CONFIG: /app/rockpool.compose.config.json
      CONTAINER_HOST: unix:///run/podman.sock
      CONTROL_PLANE_HOST: control-plane
    security_opt:
      - label=disable
    restart: unless-stopped
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - rockpool-data:/opt/rockpool
      - /var/run/docker.sock:/run/podman.sock
    depends_on:
      - caddy
      - elasticmq

volumes:
  caddy-data:
  caddy-config:
  rockpool-data:
  node-modules:
    name: rockpool-node-modules
