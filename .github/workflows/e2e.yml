name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start Podman socket
        run: |
          systemctl --user start podman.socket
          echo "DOCKER_HOST=unix://${XDG_RUNTIME_DIR}/podman/podman.sock" >> $GITHUB_ENV

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ hashFiles('typespec/main.tsp', 'typespec/tspconfig.yaml', 'Makefile') }}

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Cache control-plane image
        id: cache-control-plane
        uses: actions/cache@v4
        with:
          path: /tmp/control-plane-image.tar
          key: control-plane-${{ hashFiles('images/control-plane/Dockerfile') }}

      - name: Cache workspace image
        id: cache-workspace
        uses: actions/cache@v4
        with:
          path: /tmp/workspace-image.tar
          key: workspace-${{ hashFiles('images/workspace/Dockerfile', 'images/workspace/entrypoint.sh', 'images/scripts/setup.sh') }}

      - name: Load or build container images (parallel)
        run: |
          set -euo pipefail

          load_or_build_control_plane() {
            if [ "${{ steps.cache-control-plane.outputs.cache-hit }}" = "true" ]; then
              echo "::group::Loading control-plane image from cache"
              podman load -i /tmp/control-plane-image.tar
              echo "::endgroup::"
            else
              echo "::group::Building control-plane image"
              podman build -t rockpool-control-plane:latest images/control-plane/
              podman save -o /tmp/control-plane-image.tar rockpool-control-plane:latest
              echo "::endgroup::"
            fi
            mkdir -p .stamps && touch .stamps/rockpool-control-plane
          }

          load_or_build_workspace() {
            if [ "${{ steps.cache-workspace.outputs.cache-hit }}" = "true" ]; then
              echo "::group::Loading workspace image from cache"
              podman load -i /tmp/workspace-image.tar
              echo "::endgroup::"
            else
              echo "::group::Building workspace image"
              podman build -t rockpool-workspace:latest images/workspace/
              podman save -o /tmp/workspace-image.tar rockpool-workspace:latest
              echo "::endgroup::"
            fi
            mkdir -p .stamps && touch .stamps/rockpool-workspace-container
          }

          load_or_build_control_plane &
          pid_cp=$!

          load_or_build_workspace &
          pid_ws=$!

          wait $pid_cp || exit 1
          wait $pid_ws || exit 1

          echo "Both container images ready."

      - name: Populate node_modules volume
        run: |
          mkdir -p .stamps
          podman run --rm -e CI=1 \
            -v ${{ github.workspace }}:/app \
            -v rockpool_node-modules:/app/node_modules \
            -w /app rockpool-control-plane:latest npm ci
          touch .stamps/node-modules-linux

      - name: Build client
        run: npm run build -w packages/client

      - name: Run E2E tests
        run: npm run test:e2e:headless
        env:
          SKIP_PRETEST: "1"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
