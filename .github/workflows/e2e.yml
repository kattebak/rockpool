name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start Podman socket
        run: |
          systemctl --user start podman.socket
          echo "DOCKER_HOST=unix://${XDG_RUNTIME_DIR}/podman/podman.sock" >> $GITHUB_ENV

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ hashFiles('typespec/main.tsp', 'typespec/tspconfig.yaml', 'Makefile') }}

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build control-plane image and populate node_modules volume
        run: make .stamps/node-modules-linux

      - name: Build workspace image
        run: make .stamps/rockpool-workspace-container

      - name: Build client
        run: npm run build -w packages/client

      - name: Run E2E tests
        run: npm run test:e2e:headless
        env:
          SKIP_PRETEST: "1"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
