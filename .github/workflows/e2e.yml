name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache control-plane image
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/control-plane-image.tar
          key: control-plane-${{ hashFiles('images/control-plane/Dockerfile') }}

      - name: Build control-plane image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          podman build -t rockpool-control-plane:latest images/control-plane/
          podman save -o /tmp/control-plane-image.tar rockpool-control-plane:latest

      - name: Upload control-plane image
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-image
          path: /tmp/control-plane-image.tar
          retention-days: 1

  build-workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache workspace image
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/workspace-image.tar
          key: workspace-${{ hashFiles('images/workspace/Dockerfile', 'images/workspace/entrypoint.sh', 'images/scripts/setup.sh') }}

      - name: Build workspace image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          podman build -t rockpool-workspace:latest images/workspace/
          podman save -o /tmp/workspace-image.tar rockpool-workspace:latest

      - name: Upload workspace image
        uses: actions/upload-artifact@v4
        with:
          name: workspace-image
          path: /tmp/workspace-image.tar
          retention-days: 1

  e2e:
    needs: [build-control-plane, build-workspace]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start Podman socket
        run: |
          systemctl --user start podman.socket
          echo "DOCKER_HOST=unix://${XDG_RUNTIME_DIR}/podman/podman.sock" >> $GITHUB_ENV

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ hashFiles('typespec/main.tsp', 'typespec/tspconfig.yaml', 'Makefile') }}

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Download control-plane image
        uses: actions/download-artifact@v4
        with:
          name: control-plane-image
          path: /tmp

      - name: Download workspace image
        uses: actions/download-artifact@v4
        with:
          name: workspace-image
          path: /tmp

      - name: Load container images
        run: |
          podman load -i /tmp/control-plane-image.tar
          podman load -i /tmp/workspace-image.tar
          mkdir -p .stamps
          touch .stamps/rockpool-control-plane
          touch .stamps/rockpool-workspace-container

      - name: Cache node_modules volume
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: /tmp/node-modules-volume.tar
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('package-lock.json', 'images/control-plane/Dockerfile') }}

      - name: Restore node_modules volume
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: |
          podman volume create rockpool-node-modules
          podman volume import rockpool-node-modules /tmp/node-modules-volume.tar
          mkdir -p .stamps
          touch .stamps/node-modules-linux

      - name: Populate node_modules volume
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          podman run --rm -e CI=1 \
            --entrypoint="" \
            -v ${{ github.workspace }}:/app \
            -v rockpool-node-modules:/app/node_modules \
            -w /app rockpool-control-plane:latest npm ci
          podman run --rm \
            --entrypoint="" \
            -v ${{ github.workspace }}:/app \
            -v rockpool-node-modules:/app/node_modules \
            -w /app/node_modules rockpool-control-plane:latest \
            tar cf /dev/stdout --dereference . > /tmp/node-modules-volume.tar
          mkdir -p .stamps
          touch .stamps/node-modules-linux

      - name: Cache client build
        id: cache-client
        uses: actions/cache@v4
        with:
          path: packages/client/dist
          key: client-${{ hashFiles('packages/client/src/**', 'packages/client/index.html', 'packages/client/vite.config.*', 'packages/client/tsconfig.*', 'packages/client/tailwind.*', 'packages/client/postcss.*', 'rockpool.test.config.json') }}

      - name: Build client
        if: steps.cache-client.outputs.cache-hit != 'true'
        run: ROCKPOOL_CONFIG=rockpool.test.config.json npm run build -w packages/client

      - name: Run E2E tests
        run: npm run test:e2e:headless
        env:
          SKIP_PRETEST: "1"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
